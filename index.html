<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felix · Location Picker test harness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const s = localStorage.getItem("felix-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = s === "dark" || s === "light" ? s : prefersDark ? "dark" : "light";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
